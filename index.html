<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0b0f1a" />
<title>小游戏合集</title>
<style>
  :root {
    --bg: #0b0f1a;
    --panel: #141a2b;
    --panel-hover: #1b2238;
    --text: #e5e7eb;
    --muted: #94a3b8;
    --accent: #60a5fa;
    --border: #2a3247;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
  }
  body {
    padding:
      calc(env(safe-area-inset-top) + 24px)
      calc(env(safe-area-inset-right) + 16px)
      calc(env(safe-area-inset-bottom) + 24px)
      calc(env(safe-area-inset-left) + 16px);
    max-width: 560px;
    margin: 0 auto;
  }
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  h1 {
    margin: 0 0 6px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .sub {
    color: var(--muted);
    font-size: 13px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  @media (min-width: 480px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }
  .card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    text-decoration: none;
    transition: background .15s ease, transform .05s ease;
  }
  .card:active { transform: scale(0.98); }
  @media (hover: hover) {
    .card:hover { background: var(--panel-hover); }
  }
  .card.disabled {
    opacity: 0.5;
    pointer-events: none;
  }
  .icon {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
    background: #1f2742;
  }
  .meta { flex: 1; min-width: 0; }
  .name {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
  }
  .desc {
    margin: 2px 0 0;
    font-size: 12px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tag {
    font-size: 10px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 999px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .arrow { color: var(--muted); font-size: 18px; }
  footer {
    margin-top: 32px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <header>
    <h1>🎮 小游戏合集</h1>
    <div class="sub">点击进入 · 手机友好</div>
  </header>

  <div class="grid">
    <a class="card" href="snake/">
      <div class="icon" style="background: #1a3a2a;">🐍</div>
      <div class="meta">
        <p class="name">贪吃蛇</p>
        <p class="desc">经典玩法 · 滑动控制</p>
      </div>
      <span class="arrow">›</span>
    </a>

    <a class="card" href="weiqi/">
      <div class="icon" style="background: #3a2a1a;">⚫</div>
      <div class="meta">
        <p class="name">围棋 · 定式</p>
        <p class="desc">19路 · 录入并练习自定义定式</p>
      </div>
      <span class="arrow">›</span>
    </a>

    <a class="card disabled" href="#">
      <div class="icon">➕</div>
      <div class="meta">
        <p class="name">敬请期待<span class="tag">即将推出</span></p>
        <p class="desc">告诉我你想玩什么</p>
      </div>
    </a>
  </div>

  <footer>
    源码 · <a href="https://github.com/stevenzhangxb/cc">github.com/stevenzhangxb/cc</a>
  </footer>
</body>
</html>
